<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VISADERM DASHBOARD</title>

<style>
body {
    font-family: Arial;
    background: black;
    color: white;
    text-align: center;
    padding: 40px;
}

.card {
    background: #111;
    padding: 20px;
    margin: 10px;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>VISADERM DASHBOARD</h1>

<div class="card">UF: <span id="uf">--</span></div>
<div class="card">Fios: <span id="fios">--</span></div>
<div class="card">Score: <span id="score">--</span></div>

<br>

<input type="file" id="file">
<br><br>

<button onclick="analisar()">Analisar</button>

<script>
async function analisar() {

    let file = document.getElementById("file").files[0];

    if (!file) {
        alert("Selecione uma imagem primeiro");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    let response = await fetch("https://graftscan-api.onrender.com/analyze", {
        method: "POST",
        body: formData
    });

    let data = await response.json();

    document.getElementById("uf").innerText = data.uf;
    document.getElementById("fios").innerText = data.hairs;
    document.getElementById("score").innerText = data.score;
}
</script>

</body>
</html>
